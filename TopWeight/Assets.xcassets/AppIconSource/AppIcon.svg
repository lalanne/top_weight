<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <!-- Barbell bar -->
  <rect x="184" y="472" width="656" height="80" rx="40" fill="url(#bar)"/>
  <!-- Left weight plate -->
  <circle cx="224" cy="512" r="110" fill="url(#plate)"/>
  <circle cx="224" cy="512" r="85" fill="none" stroke="#1e3a8a" stroke-width="12"/>
  <!-- Right weight plate -->
  <circle cx="800" cy="512" r="110" fill="url(#plate)"/>
  <circle cx="800" cy="512" r="85" fill="none" stroke="#1e3a8a" stroke-width="12"/>
</svg>
